name: Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer cython kivy==2.3.0

      - name: Install Android SDK & Kivy Core Packages
        run: |
          sudo apt-get update
          # 🛠️ 一次過補齊所有 C 語言編譯必備庫（防範 Error code 1）
          sudo apt-get install -y libsqlite3-dev lld openjdk-17-jdk unzip zip \
            libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good

      - name: Run Buildozer (Force Accept Licenses)
        run: yes | buildozer -v android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BearRadar-APK
          path: bin/*.apk
