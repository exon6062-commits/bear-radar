name: Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer cython kivy==2.3.0

      - name: Install Android SDK Packages
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev lld openjdk-17-jdk unzip zip

      - name: Run Buildozer (Force Accept Licenses)
        # 🛠️ 核心一槍通關：直接用 yes | 強行灌進整條打包指令，遇到任何授權自動簽字！
        run: yes | buildozer -v android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BearRadar-APK
          path: bin/*.apk
