name: Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # 🏆 直接借用官方早已打包好、環境絕對純淨且內置所有 C 語言工具鏈的 Docker 貨櫃
    container:
      image: kivy/buildozer:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 容器內已經自帶完美對齊的 Python、Java 與 SDK，直接開工，遇到協議自動回答 YES
      - name: Run Buildozer
        run: |
          id
          yes | buildozer -v android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BearRadar-APK
          path: bin/*.apk
